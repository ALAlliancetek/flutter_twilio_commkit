name: minimal_example
description: Minimal integration example for flutter_twilio_commkit.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  # Push notifications (FCM) — needed for incoming Twilio Voice calls
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.3
  flutter_twilio_commkit:
    path: ../../flutter_twilio_commkit
  audioplayers: ^6.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
